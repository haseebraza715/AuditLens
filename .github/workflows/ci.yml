name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package (dev extras)
        run: python -m pip install -U pip && pip install -e ".[dev]"

      - name: Run tests (fast suite)
        run: pytest tests/ -m "not slow and not e2e" -q --tb=short

      - name: Import smoke test
        run: python -c "from auditlens import audit; print('import ok')"

  e2e-and-slow:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package (dev + e2e)
        run: python -m pip install -U pip && pip install -e ".[dev,e2e]"

      - name: Install Playwright browser (Chromium only)
        run: python -m playwright install --with-deps chromium

      - name: Run slow packaging tests and Playwright e2e
        run: pytest tests/ -m "slow or e2e" -q --tb=short
